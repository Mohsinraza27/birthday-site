<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Bhaggu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Start Screen -->
<div id="start-screen">
  <h2>Hey Bhaggu… 👀</h2>
  <button onclick="startExperience()">Tap to start 💖</button>
</div>

<!-- Main -->
<div id="main" class="hidden">

  <h1 class="title">Happy Birthday 💖</h1>

  <div class="chat-container" id="chat"></div>

  <div class="photo-card">
    <img src="photo.jpeg">
  </div>

  <button onclick="showReason()">Click slowly 😌</button>
  <p id="reason"></p>

  <button onclick="unlockLetter()">Open your letter 💌</button>
  <div id="letter" class="hidden letter-box">
    <p id="letterText"></p>
  </div>

</div>

<audio id="music" src="music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
