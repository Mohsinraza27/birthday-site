<!DOCTYPE html>
<html>
<head>
<title>For Bhaggu 💖</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="center">
  <h1>Hey Bhaggu 💖</h1>
  <p>Something special is waiting...</p>

  <h2 id="countdown">10</h2>

  <button onclick="goNext()">Enter ✨</button>
</div>

<script>
let t = 10;
let timer = setInterval(()=>{
  document.getElementById("countdown").innerText = t;
  t--;
  if(t<0) clearInterval(timer);
},1000);

function goNext(){
  window.location.href = "chat.html";
}
</script>

</body>
</html>
