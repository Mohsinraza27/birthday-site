<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Bhaggu 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Entry -->
  <div id="entry" class="center">
    <p>Hey Bhaggu… 👀</p>
    <button onclick="start()">🎁 Open</button>
  </div>

  <!-- Main Content -->
  <div id="main" class="hidden">

    <h1>Happy Birthday, Bhaggu 💖</h1>

    <!-- Typing -->
    <p id="typing"></p>

    <!-- Photo -->
    <div class="photo">
      <img src="photo.jpg" alt="Bhaggu">
    </div>

    <!-- Reasons -->
    <button onclick="showReason()">Click slowly… 😌</button>
    <p id="reason"></p>

    <!-- Final -->
    <p class="final">
      Happy Birthday again 💕<br>
      Stay the same… that’s your magic ✨
    </p>

  </div>

</div>

<!-- Music -->
<audio id="music" src="music.mp3"></audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>
</body>
</html>
