<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Bhaggu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 60s Countdown -->
<div id="countdown-screen">
  <h2>Wait for it… Bhaggu 💖</h2>
  <h1 id="countdown">60</h1>
</div>

<!-- Main -->
<div id="main" class="hidden">

  <div class="chat-container" id="chat"></div>

  <div class="photo-card">
    <img src="photo.jpeg">
  </div>

  <button onclick="showReason()">Click slowly 😌</button>
  <p id="reason"></p>

  <button onclick="unlockLetter()">Open your letter 💌</button>
  <div id="letter" class="hidden letter-box">
    <p id="letterText"></p>
  </div>

</div>

<audio id="music" src="music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
